services:
  # Run database migrations
  migrate:
    image: ghcr.io/hotosm/portal-backend:${IMAGE_TAG:-latest}
    command: ["uv", "run", "alembic", "upgrade", "head"]
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-portal}:${POSTGRES_PASSWORD:-portal}@db:5432/${POSTGRES_DB:-portal}
    restart: "no"
    profiles:
      - prod

  # PostgreSQL with PostGIS extension
  db:
    image: postgis/postgis:16-3.4
    container_name: portal-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-portal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-portal}
      POSTGRES_DB: ${POSTGRES_DB:-portal}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-portal}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI backend
  backend:
    image: ghcr.io/hotosm/portal-backend:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: ${BACKEND_TARGET:-production}
    container_name: portal-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-portal}:${POSTGRES_PASSWORD:-portal}@db:5432/${POSTGRES_DB:-portal}
      DEBUG: ${DEBUG:-false}
      # Authentication settings
      HANKO_API_URL: ${HANKO_API_URL:-https://dev.login.hotosm.org}
      JWT_ISSUER: ${JWT_ISSUER:-auto}
      COOKIE_SECRET: ${COOKIE_SECRET}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      OSM_CLIENT_ID: ${OSM_CLIENT_ID:-}
      OSM_CLIENT_SECRET: ${OSM_CLIENT_SECRET:-}
      OSM_REDIRECT_URI: ${OSM_REDIRECT_URI:-}
      # External service URLs
      DRONE_TM_BACKEND_URL: ${DRONE_TM_BACKEND_URL:-}
      FAIR_API_BASE_URL: ${FAIR_API_BASE_URL:-}
      FAIR_VERIFY_SSL: ${FAIR_VERIFY_SSL:-}
      UMAP_BASE_URL: ${UMAP_BASE_URL:-https://umap.hotosm.org}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    profiles:
      - prod

  # FastAPI backend (development with hot-reload)
  backend-dev:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: development
    container_name: portal-backend-dev
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-portal}:${POSTGRES_PASSWORD:-portal}@db:5432/${POSTGRES_DB:-portal}
      DEBUG: "true"
      # Authentication settings (talks to the local hanko/login-dev services below).
      # Fixed (not overridable via .env): JWT_ISSUER must match hanko-config.yaml's
      # session.issuer (the public login.hotosm.test origin), NOT the internal
      # HANKO_API_URL — otherwise "auto" would resolve the issuer to http://hanko:8000
      # and token validation would fail.
      HANKO_API_URL: http://hanko:8000
      JWT_ISSUER: https://login.hotosm.test
      COOKIE_SECRET: ${COOKIE_SECRET}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-.hotosm.test}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      OSM_CLIENT_ID: ${OSM_CLIENT_ID:-}
      OSM_CLIENT_SECRET: ${OSM_CLIENT_SECRET:-}
      OSM_REDIRECT_URI: ${OSM_REDIRECT_URI:-}
      PORTAL_BASE_URL: ${PORTAL_BASE_URL:-https://portal.hotosm.test}
      UMAP_BASE_URL: ${UMAP_BASE_URL:-https://umap.hotosm.org}
      DRONE_TM_BACKEND_URL: ${DRONE_TM_BACKEND_URL:-}
      FAIR_API_BASE_URL: ${FAIR_API_BASE_URL:-}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-http://minio:9000}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-portal-dev}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
      hanko:
        condition: service_started
    command: sh -c "uv run alembic upgrade head && uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir app --reload-exclude '.venv/*' --reload-exclude 'app/tests/*' --reload-exclude '.pytest_cache/*'"
    profiles:
      - dev

  # MinIO object storage (S3-compatible, dev only)
  minio:
    image: quay.io/minio/minio
    container_name: portal-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
    profiles:
      - dev

  # Creates the portal-dev bucket on first run
  minio-init:
    image: quay.io/minio/mc
    container_name: portal-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/portal-dev &&
      mc anonymous set public local/portal-dev
      "
    restart: "no"
    profiles:
      - dev

  # React frontend
  frontend:
    image: ghcr.io/hotosm/portal-frontend:${IMAGE_TAG:-latest}
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: ${FRONTEND_TARGET:-production}
    container_name: portal-frontend
    environment:
      - VITE_BACKEND_URL=http://backend:8000
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Mount SSL certificates from host
      - /etc/letsencrypt:/etc/letsencrypt:ro
      # Mount certbot webroot for ACME challenge
      - /var/www/certbot:/var/www/certbot:ro
      # Use SSL-enabled nginx config
      - ./frontend/nginx-ssl.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: unless-stopped
    profiles:
      - prod

  # React frontend (development with hot-reload)
  frontend-dev:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: portal-frontend-dev
    environment:
      - VITE_HANKO_URL=https://login.hotosm.test
      - VITE_API_URL=https://portal.hotosm.test/api
      - VITE_BACKEND_URL=http://backend-dev:8000
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend-dev
    profiles:
      - dev

  # Caddy reverse proxy: terminates HTTPS for portal.hotosm.test / login.hotosm.test
  # locally, without Traefik or hot-dev-env.
  caddy:
    image: caddy:2-alpine
    container_name: portal-caddy
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./certs:/etc/caddy/certs:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - frontend-dev
      - backend-dev
      - login-frontend
      - login-backend
      - hanko
    profiles:
      - dev

  # --- Login / Hanko (built from the sibling ../login repo) ---

  login-frontend:
    build:
      context: ../login/frontend
      dockerfile: Dockerfile
      target: dev
    container_name: portal-login-frontend
    volumes:
      - ../login/frontend/src:/app/src
      - ../login/frontend/public:/app/public
      - ../login/frontend/vite.config.ts:/app/vite.config.ts
    environment:
      - VITE_HANKO_URL=https://login.hotosm.test
      - VITE_BACKEND_URL=https://login.hotosm.test/api
    depends_on:
      - login-backend
    profiles:
      - dev

  login-backend:
    build:
      context: ../login/backend
      dockerfile: Dockerfile
      target: dev
    container_name: portal-login-backend
    volumes:
      - ../login/backend/app:/app/app
    environment:
      - HANKO_API_URL=http://hanko:8000
      - JWT_ISSUER=https://login.hotosm.test
      - COOKIE_SECRET=${COOKIE_SECRET}
      - OSM_CLIENT_ID=${OSM_CLIENT_ID:-}
      - OSM_CLIENT_SECRET=${OSM_CLIENT_SECRET:-}
      # Fixed (not the portal OSM_REDIRECT_URI): this is login-backend's own callback,
      # must be registered as an additional redirect URI on the same OSM OAuth app.
      - OSM_REDIRECT_URI=https://login.hotosm.test/api/auth/osm/callback
      - ADMIN_EMAILS=${ADMIN_EMAILS:-admin@hotosm.org}
      - PORTAL_BACKEND_URL=http://backend-dev:8000
    depends_on:
      - hanko
      - hanko-db
    profiles:
      - dev

  hanko-migrate:
    image: ghcr.io/teamhanko/hanko:v2.5.0
    container_name: portal-hanko-migrate
    volumes:
      - ./config/hanko-config.yaml:/etc/config/config.yaml:ro
    command: migrate up --config /etc/config/config.yaml
    environment:
      - DATABASE_URL=postgres://hanko:hanko@hanko-db:5432/hanko?sslmode=disable
    depends_on:
      hanko-db:
        condition: service_healthy
    restart: "no"
    profiles:
      - dev

  hanko:
    image: ghcr.io/teamhanko/hanko:v2.5.0
    container_name: portal-hanko
    volumes:
      - ./config/hanko-config.yaml:/etc/config/config.yaml:ro
    command: serve --config /etc/config/config.yaml public
    environment:
      - DATABASE_URL=postgres://hanko:hanko@hanko-db:5432/hanko?sslmode=disable
      - SESSION_COOKIE_DOMAIN=.hotosm.test
      - SESSION_COOKIE_HTTP_ONLY=true
      - SESSION_COOKIE_SAME_SITE=none
      - SESSION_COOKIE_SECURE=true
      - THIRD_PARTY_COOKIE_DOMAIN=.hotosm.test
    depends_on:
      hanko-db:
        condition: service_healthy
      hanko-migrate:
        condition: service_completed_successfully
    profiles:
      - dev

  hanko-db:
    image: postgres:17-alpine
    container_name: portal-hanko-db
    environment:
      - POSTGRES_USER=hanko
      - POSTGRES_PASSWORD=hanko
      - POSTGRES_DB=hanko
    volumes:
      - hanko_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hanko -d hanko"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - dev

  # Mailhog - catches emails sent by Hanko (password recovery, verification) in dev
  mailhog:
    image: mailhog/mailhog:latest
    container_name: portal-mailhog
    ports:
      - "8025:8025"
    profiles:
      - dev

volumes:
  postgres_data:
    name: portal-postgres-data
  minio_data:
    name: portal-minio-data
  hanko_db_data:
    name: portal-hanko-db-data
